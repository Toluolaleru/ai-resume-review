<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Resume Reviewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 6px;
    }

    header p {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      border: 0.5px solid rgba(0,0,0,0.12);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
      font-weight: 500;
    }

    textarea {
      width: 100%;
      font-size: 14px;
      line-height: 1.6;
      padding: 12px;
      border-radius: 8px;
      border: 0.5px solid rgba(0,0,0,0.2);
      background: #fafafa;
      color: #1a1a1a;
      resize: vertical;
      font-family: inherit;
      margin-bottom: 1rem;
    }

    textarea:focus {
      outline: none;
      border-color: rgba(0,0,0,0.4);
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    select {
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 0.5px solid rgba(0,0,0,0.2);
      background: #fff;
      color: #1a1a1a;
      cursor: pointer;
    }

    button {
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 8px;
      border: 0.5px solid rgba(0,0,0,0.2);
      background: #1a1a1a;
      color: #fff;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .loading {
      display: none;
      font-size: 14px;
      color: #666;
      margin-top: 1rem;
      padding: 12px 0;
    }

    .scores {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .score-card {
      background: #f5f5f3;
      border-radius: 8px;
      padding: 1rem;
      text-align: center;
    }

    .score-card .label {
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
    }

    .score-card .value {
      font-size: 24px;
      font-weight: 500;
      color: #1a1a1a;
    }

    .summary-box {
      padding: 12px 16px;
      background: #f5f5f3;
      border-radius: 8px;
      font-size: 14px;
      color: #555;
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    .feedback-section {
      background: #fff;
      border: 0.5px solid rgba(0,0,0,0.1);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 10px;
    }

    .feedback-section h3 {
      font-size: 13px;
      font-weight: 500;
      color: #888;
      margin-bottom: 10px;
    }

    .feedback-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 8px;
      font-size: 14px;
      line-height: 1.5;
      color: #1a1a1a;
    }

    .dot {
      min-width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-top: 6px;
    }

    .dot-green { background: #3B6D11; }
    .dot-amber { background: #BA7517; }

    .error {
      display: none;
      font-size: 13px;
      color: #A32D2D;
      margin-top: 10px;
    }

    #results { display: none; }

    footer {
      text-align: center;
      font-size: 12px;
      color: #aaa;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>AI Resume Reviewer</h1>
      <p>Paste your resume below and get instant AI-powered feedback on clarity, impact, and role alignment.</p>
    </header>

    <div class="card">
      <label for="resumeInput">Your resume</label>
      <textarea id="resumeInput" rows="12" placeholder="Paste your resume text here..."></textarea>

      <label for="roleSelect">Target role</label>
      <div class="controls">
        <select id="roleSelect">
          <option value="Frontend Engineer">Frontend Engineer</option>
          <option value="UX/Product Designer">UX/Product Designer</option>
          <option value="Product Manager">Product Manager</option>
          <option value="Full Stack Engineer">Full Stack Engineer</option>
          <option value="AI/ML Engineer">AI/ML Engineer</option>
        </select>
        <button id="reviewBtn" onclick="runReview()">Review my resume</button>
      </div>

      <div class="loading" id="loadingState">Analysing your resume...</div>
      <div class="error" id="errorState"></div>
    </div>

    <div id="results">
      <div class="scores">
        <div class="score-card">
          <div class="label">Overall score</div>
          <div class="value" id="scoreOverall">—</div>
        </div>
        <div class="score-card">
          <div class="label">Impact clarity</div>
          <div class="value" id="scoreImpact">—</div>
        </div>
        <div class="score-card">
          <div class="label">Role alignment</div>
          <div class="value" id="scoreAlign">—</div>
        </div>
      </div>

      <div class="summary-box" id="summaryBox"></div>

      <div class="feedback-section" id="strengthsSection">
        <h3>What is working well</h3>
        <div id="strengthsList"></div>
      </div>

      <div class="feedback-section" id="improvementsSection">
        <h3>Areas to improve</h3>
        <div id="improvementsList"></div>
      </div>
    </div>

    <footer>Built with the Claude API &mdash; Tolu Olaleru</footer>
  </div>

  <script>
    async function runReview() {
      const resume = document.getElementById('resumeInput').value.trim();
      const role = document.getElementById('roleSelect').value;
      const errorEl = document.getElementById('errorState');

      if (!resume) {
        errorEl.style.display = 'block';
        errorEl.textContent = 'Please paste your resume before reviewing.';
        return;
      }

      errorEl.style.display = 'none';
      document.getElementById('results').style.display = 'none';
      document.getElementById('loadingState').style.display = 'block';
      document.getElementById('reviewBtn').disabled = true;

      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            system: `You are an expert resume coach. Review the resume for a ${role} role. Respond ONLY with a JSON object, no markdown, no backticks, no preamble. Format:
{
  "overall": 82,
  "impact": 78,
  "alignment": 85,
  "strengths": ["strength 1", "strength 2", "strength 3"],
  "improvements": ["improvement 1", "improvement 2", "improvement 3"],
  "summary": "One sentence overall verdict."
}
Scores are integers 0-100.`,
            messages: [{ role: 'user', content: `Review this resume:\n\n${resume}` }]
          })
        });

        const data = await res.json();
        const raw = data.content.map(b => b.text || '').join('');
        const clean = raw.replace(/```json|```/g, '').trim();
        const parsed = JSON.parse(clean);

        document.getElementById('scoreOverall').textContent = parsed.overall + '/100';
        document.getElementById('scoreImpact').textContent = parsed.impact + '/100';
        document.getElementById('scoreAlign').textContent = parsed.alignment + '/100';
        document.getElementById('summaryBox').textContent = parsed.summary;

        const makeItems = (items, dotClass, containerId) => {
          const container = document.getElementById(containerId);
          container.innerHTML = '';
          items.forEach(item => {
            const row = document.createElement('div');
            row.className = 'feedback-item';
            const dot = document.createElement('span');
            dot.className = `dot ${dotClass}`;
            const text = document.createElement('span');
            text.textContent = item;
            row.appendChild(dot);
            row.appendChild(text);
            container.appendChild(row);
          });
        };

        makeItems(parsed.strengths, 'dot-green', 'strengthsList');
        makeItems(parsed.improvements, 'dot-amber', 'improvementsList');

        document.getElementById('results').style.display = 'block';

      } catch (err) {
        errorEl.style.display = 'block';
        errorEl.textContent = 'Something went wrong. Please try again.';
      } finally {
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('reviewBtn').disabled = false;
      }
    }
  </script>
</body>
</html>
